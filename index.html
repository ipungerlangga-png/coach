<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Coaching — TalentRadar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#141414;--bg2:#1c1c1c;--bg3:#242424;--bg4:#2e2e2e;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#e50914;--accent-dim:rgba(229,9,20,.1);--accent-glow:rgba(229,9,20,.2);
  --text:#f0f0f0;--text2:#a0a0a0;--text3:#5a5a5a;
  --green:#46b97c;--yellow:#e8a020;--blue:#5b9cf6;
  --radius:12px;--radius-lg:18px;
  --user-bubble:#e50914;--ai-bubble:#242424;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;max-width:780px;margin:0 auto}

/* ── HEADER ── */
.c-header{padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(20,20,20,.95);backdrop-filter:blur(16px);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:14px}
.c-brand{display:flex;align-items:center;gap:9px}
.c-logo{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.c-brand-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600}
.c-brand-name span{color:var(--accent)}
.c-meta{text-align:right}
.c-topic{font-size:.78rem;font-weight:500;color:var(--text)}
.c-talent-name{font-size:.69rem;color:var(--text3);margin-top:1px}

/* ── PROFILE BANNER ── */
.profile-banner{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;flex-shrink:0}
.pb-inner{display:flex;align-items:center;gap:14px}
.pb-avatar{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--text3);flex-shrink:0;font-family:'Playfair Display',serif;font-weight:600}
.pb-name{font-size:.9rem;font-weight:500}
.pb-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.pb-tag{font-size:.63rem;padding:1px 7px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.pb-tag.red{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-glow)}
.pb-scores{margin-left:auto;display:flex;gap:10px;flex-shrink:0}
.pb-score{text-align:center}
.pb-score-val{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--text);line-height:1}
.pb-score-lbl{font-size:.56rem;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:1px}

/* ── CHAT AREA ── */
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}

/* ── MESSAGES ── */
.msg{display:flex;gap:10px;align-items:flex-end;animation:msgIn .22s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;flex-shrink:0;margin-bottom:2px}
.msg.ai .msg-avatar{background:var(--accent);color:#fff}
.msg.user .msg-avatar{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.msg-bubble{max-width:78%;padding:11px 14px;border-radius:14px;font-size:.855rem;line-height:1.65;word-break:break-word}
.msg.ai .msg-bubble{background:var(--ai-bubble);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.msg.user .msg-bubble{background:var(--accent);border-bottom-right-radius:4px;color:#fff}
.msg-bubble p{margin-bottom:8px}.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble strong{font-weight:600}
.msg-bubble ul,.msg-bubble ol{padding-left:16px;margin-bottom:8px}
.msg-bubble li{margin-bottom:3px}
.msg-time{font-size:.62rem;color:var(--text3);margin-top:4px;text-align:right}
.msg.ai .msg-time{text-align:left}

/* typing indicator */
.typing-dots{display:flex;gap:4px;padding:12px 14px;background:var(--ai-bubble);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:4px;width:fit-content}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:dot .9s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ── INPUT AREA ── */
.input-area{padding:14px 20px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.input-wrap{display:flex;gap:9px;align-items:flex-end}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:10px 14px;color:var(--text);font-size:.855rem;font-family:'Outfit',sans-serif;resize:none;max-height:120px;min-height:42px;line-height:1.5;transition:border-color .15s;overflow-y:auto}
.chat-input:focus{outline:none;border-color:rgba(229,9,20,.4)}
.chat-input::placeholder{color:var(--text3)}
.send-btn{width:42px;height:42px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:#fff}
.send-btn:hover{background:#f40d19;transform:scale(1.04)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:9px}
.msg-count{font-size:.68rem;color:var(--text3)}
.end-btn{font-size:.74rem;padding:5px 13px;border-radius:7px;background:transparent;border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.end-btn:hover{border-color:var(--accent);color:var(--accent)}
.end-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── STATES ── */
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 24px;text-align:center;gap:14px}
.state-icon{font-size:2.4rem}
.state-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:600}
.state-sub{font-size:.84rem;color:var(--text2);line-height:1.7;max-width:480px;font-weight:300}
.state-btn{padding:10px 24px;border-radius:9px;background:var(--accent);color:#fff;font-family:'Outfit',sans-serif;font-size:.84rem;font-weight:600;border:none;cursor:pointer;box-shadow:0 4px 16px var(--accent-glow);transition:all .18s;margin-top:4px}
.state-btn:hover{background:#f40d19;transform:translateY(-1px)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SUMMARY SCREEN ── */
.summary-screen{flex:1;overflow-y:auto;padding:24px 20px}
.summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:14px}
.summary-section-title{font-size:.63rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:10px}
.summary-text{font-size:.855rem;color:var(--text2);line-height:1.75;font-weight:300}
.summary-list{display:flex;flex-direction:column;gap:7px}
.summary-item{display:flex;gap:9px;align-items:flex-start;font-size:.84rem;color:var(--text2);line-height:1.6}
.summary-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0}
.summary-dot.green{background:var(--green)}
.saving-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999}
.saving-text{font-size:.84rem;color:var(--text2)}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Loading state -->
  <div class="state-screen" id="stateLoading">
    <div class="spinner"></div>
    <div style="font-size:.84rem;color:var(--text3)">Memuat sesi coaching...</div>
  </div>
</div>

<script>
const IS_GAS = (typeof google !== 'undefined' && typeof google.script !== 'undefined');

// ── Session ID — baca dari URL parameter ─────────────────────
const SESSION_ID = new URLSearchParams(window.location.search).get('sid') || '';
// API Key disimpan aman di GAS — tidak perlu di sini
const GAS_URL = 'https://script.google.com/macros/u/0/s/AKfycbwENuNHnMcjxOKdqeLx32WMCZPaq5ez9AIqOyKERTb5mpRGXPKWe4NfKcldbGW9aEqLkA/exec';

// ── State ─────────────────────────────────────────────────────
let sessionData  = null;
let talentData   = null;
let messages     = [];   // {role, content, time}
let isTyping     = false;
let sessionEnded = false;
let startedAt    = null;

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (!SESSION_ID) { showError('Link tidak valid', 'Parameter sesi tidak ditemukan di URL.'); return; }
  await loadSession();
});

async function loadSession() {
  try {
    const res = await callGAS('getCoachingSession', SESSION_ID);
    if (!res.success) { showError('Sesi Tidak Valid', res.error || 'Sesi tidak ditemukan atau sudah selesai.'); return; }
    sessionData = res.session;
    talentData  = res.talent;
    startedAt   = new Date().toLocaleString('id-ID');
    renderChatUI();
    await sendOpeningMessage();
  } catch(e) {
    showError('Gagal Memuat Sesi', e.message);
  }
}

// ── Render UI ─────────────────────────────────────────────────
function renderChatUI() {
  const initials = (talentData.nama || '?').charAt(0).toUpperCase();
  const ovrColor = talentData.ovr >= 80 ? '#46b97c' : talentData.ovr >= 70 ? '#e8a020' : '#e50914';

  document.getElementById('app').innerHTML = `
    <div class="c-header">
      <div class="c-brand">
        <div class="c-logo">TR</div>
        <div class="c-brand-name">Talent<span>Radar</span> <span style="color:var(--text3);font-family:'Outfit',sans-serif;font-weight:300;font-size:.8rem">· AI Coach</span></div>
      </div>
      <div class="c-meta">
        <div class="c-topic">${escHtml(sessionData.topicLabel)}</div>
        <div class="c-talent-name">${escHtml(talentData.nama)}</div>
      </div>
    </div>

    <div class="profile-banner">
      <div class="pb-inner">
        <div class="pb-avatar">${initials}</div>
        <div>
          <div class="pb-name">${escHtml(talentData.nama)}</div>
          <div class="pb-tags">
            <span class="pb-tag red">${escHtml(talentData.pipeline)}</span>
            <span class="pb-tag">${escHtml(talentData.readiness)}</span>
            ${talentData.archetype1 ? `<span class="pb-tag">${escHtml(talentData.archetype1)}</span>` : ''}
            ${talentData.archetype2 ? `<span class="pb-tag">${escHtml(talentData.archetype2)}</span>` : ''}
          </div>
        </div>
        <div class="pb-scores">
          <div class="pb-score"><div class="pb-score-val" style="color:${ovrColor}">${talentData.ovr||'–'}</div><div class="pb-score-lbl">OVR</div></div>
          ${['DEC','BUS','LED','COT','COM','EXE'].map(k => {
            const v = talentData[k.toLowerCase()];
            return `<div class="pb-score"><div class="pb-score-val">${v||'–'}</div><div class="pb-score-lbl">${k}</div></div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="Ketik pesan Anda..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="msg-count" id="msgCount">0 pesan</span>
        <button class="end-btn" id="endBtn" onclick="confirmEndSession()">✓ Selesaikan Sesi</button>
      </div>
    </div>
  `;
}

// ── Opening message ───────────────────────────────────────────
async function sendOpeningMessage() {
  const openingPrompt = buildSystemPrompt();
  const opening = await callClaude([], openingPrompt, true);
  appendMessage('ai', opening);
}

// ── System prompt builder ─────────────────────────────────────
function buildSystemPrompt() {
  const t = talentData;
  const weakComps = ['DEC','BUS','LED','COT','COM','EXE']
    .filter(k => (t[k.toLowerCase()]||0) < 70)
    .map(k => `${k} (${t[k.toLowerCase()]})`).join(', ') || 'tidak ada';

  return `Kamu adalah AI Executive Coach profesional dari TalentRadar — platform pengembangan talent Regional Coach di industri perbankan/finansial Indonesia.

PROFIL TALENT YANG KAMU COACHING:
- Nama: ${t.nama}
- Pipeline Step: ${t.pipeline}
- Readiness: ${t.readiness}
- OVR Score: ${t.ovr}
- Skor Kompetensi: DEC=${t.dec||'–'}, BUS=${t.bus||'–'}, LED=${t.led||'–'}, COT=${t.cot||'–'}, COM=${t.com||'–'}, EXE=${t.exe||'–'}
- Archetype I: ${t.archetype1||'Belum diisi'}
- Archetype II: ${t.archetype2||'Belum diisi'}
- Branch Fit: ${t.branchFit||'Belum diisi'}
- Kompetensi lemah (skor < 70): ${weakComps}

TOPIK SESI INI: ${sessionData.topicLabel}
PANDUAN TOPIK: ${sessionData.topicPrompt}

INSTRUKSI COACHING:
1. Mulai dengan sapaan hangat dan perkenalan singkat sebagai AI Coach
2. Gunakan pendekatan coaching Socratic — lebih banyak bertanya daripada memberikan jawaban
3. Setiap pertanyaan hanya satu di setiap giliran, jangan membanjiri talent dengan banyak pertanyaan sekaligus
4. Gunakan data profil talent (skor, archetype, pipeline) untuk membuat percakapan relevan dan personal
5. Bahasa Indonesia yang natural, hangat, profesional — bukan kaku atau terlalu formal
6. Bantu talent menemukan insight sendiri, bukan mendikte
7. Setelah 6-10 pesan, arahkan ke refleksi dan komitmen konkret
8. Respons singkat dan fokus — maksimal 3-4 paragraf pendek per giliran

Mulai sesi sekarang dengan sapaan dan pertanyaan pembuka yang relevan dengan topik dan profil talent di atas.`;
}

// ── Chat logic ────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text || isTyping || sessionEnded) return;

  input.value = '';
  autoResize(input);
  appendMessage('user', text);
  messages.push({ role:'user', content: text, time: timeNow() });
  updateMsgCount();

  setTyping(true);
  try {
    const apiMessages = messages
      .filter(m => m.role !== 'system')
      .map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content }));

    const reply = await callClaude(apiMessages, buildSystemPrompt());
    messages.push({ role:'ai', content: reply, time: timeNow() });
    appendMessage('ai', reply);
  } catch(e) {
    appendMessage('ai', 'Maaf, ada gangguan koneksi. Silakan coba lagi.');
  } finally {
    setTyping(false);
    updateMsgCount();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function appendMessage(role, content) {
  const area = document.getElementById('chatArea');
  if (!area) return;

  // Remove typing indicator if present
  const typing = document.getElementById('typingIndicator');
  if (typing) typing.remove();

  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  const initials = role === 'ai' ? 'AI' : (talentData?.nama||'?').charAt(0).toUpperCase();
  div.innerHTML = `
    <div class="msg-avatar">${initials}</div>
    <div>
      <div class="msg-bubble">${formatText(content)}</div>
      <div class="msg-time">${timeNow()}</div>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function setTyping(state) {
  isTyping = state;
  document.getElementById('sendBtn').disabled = state;
  document.getElementById('chatInput').disabled = state;

  const area = document.getElementById('chatArea');
  if (!area) return;

  if (state) {
    const t = document.createElement('div');
    t.className = 'msg ai'; t.id = 'typingIndicator';
    t.innerHTML = `<div class="msg-avatar">AI</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
    area.appendChild(t);
    area.scrollTop = area.scrollHeight;
  } else {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }
}

function updateMsgCount() {
  const el = document.getElementById('msgCount');
  if (el) el.textContent = `${messages.length} pesan`;
}

// ── End session ───────────────────────────────────────────────
function confirmEndSession() {
  if (messages.length < 2) { alert('Sesi terlalu singkat. Lanjutkan percakapan terlebih dahulu.'); return; }
  if (confirm('Apakah Anda yakin ingin mengakhiri sesi coaching? AI akan membuat ringkasan dan menyimpan hasil sesi ini.')) {
    endSession();
  }
}

async function endSession() {
  sessionEnded = true;
  document.getElementById('endBtn').disabled = true;
  document.getElementById('sendBtn').disabled = true;

  // Show saving overlay
  const overlay = document.createElement('div');
  overlay.className = 'saving-overlay';
  overlay.innerHTML = `<div class="spinner"></div><div class="saving-text">AI sedang membuat ringkasan sesi...</div>`;
  document.body.appendChild(overlay);

  try {
    // Generate summary via Claude
    const summaryData = await generateSummary();

    // Save to GAS
    const logPayload = {
      startedAt,
      summary:     summaryData.summary,
      keyInsights: summaryData.keyInsights,
      commitments: summaryData.commitments,
      transcript:  messages.map(m => ({ role: m.role, content: m.content, time: m.time }))
    };

    await callGAS('saveCoachingLog', SESSION_ID, JSON.stringify(logPayload));
    overlay.remove();
    showSummaryScreen(summaryData);
  } catch(e) {
    overlay.remove();
    alert('Gagal menyimpan sesi: ' + e.message);
    sessionEnded = false;
    document.getElementById('endBtn').disabled = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

async function generateSummary() {
  const transcript = messages.map(m =>
    `${m.role === 'ai' ? 'AI Coach' : talentData.nama}: ${m.content}`
  ).join('\n\n');

  const summaryPrompt = `Berikut adalah transcript sesi AI Coaching antara AI Coach dan ${talentData.nama}.

TRANSCRIPT:
${transcript}

Buat ringkasan sesi dalam format JSON dengan struktur PERSIS berikut (tanpa teks lain di luar JSON):
{
  "summary": "Ringkasan naratif 2-3 kalimat tentang apa yang dibahas dalam sesi ini",
  "keyInsights": "Insight 1 | Insight 2 | Insight 3",
  "commitments": "Komitmen 1 | Komitmen 2 | Komitmen 3"
}

Gunakan tanda | (pipe) sebagai pemisah antara poin-poin dalam keyInsights dan commitments.
Maksimal 3 poin per field. Bahasa Indonesia. Langsung JSON saja, tanpa penjelasan.`;

  const r = await callGAS('proxyClaudeSummary', summaryPrompt);
  const raw = r.success ? (r.text || '{}') : '{}';
  try {
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    return {
      summary:     parsed.summary     || 'Ringkasan tidak tersedia',
      keyInsights: parsed.keyInsights || '',
      commitments: parsed.commitments || '',
    };
  } catch(e) {
    return { summary: raw.substring(0,500), keyInsights:'', commitments:'' };
  }
}

// ── Summary screen ────────────────────────────────────────────
function showSummaryScreen(s) {
  const insights    = (s.keyInsights  || '').split('|').map(x=>x.trim()).filter(Boolean);
  const commitments = (s.commitments  || '').split('|').map(x=>x.trim()).filter(Boolean);

  const app = document.getElementById('app');
  const chatArea = app.querySelector('.chat-area');
  const inputArea = app.querySelector('.input-area');
  if (chatArea)  chatArea.remove();
  if (inputArea) inputArea.remove();

  const summary = document.createElement('div');
  summary.className = 'summary-screen';
  summary.innerHTML = `
    <div style="text-align:center;padding:18px 0 8px">
      <div style="font-size:2rem;margin-bottom:10px">✅</div>
      <div style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:600;margin-bottom:4px">Sesi Selesai</div>
      <div style="font-size:.78rem;color:var(--text3);font-weight:300">Ringkasan telah disimpan dalam profil Anda</div>
    </div>

    <div class="summary-card">
      <div class="summary-section-title">Ringkasan Sesi</div>
      <div class="summary-text">${escHtml(s.summary)}</div>
    </div>

    ${insights.length ? `
    <div class="summary-card">
      <div class="summary-section-title">Key Insights</div>
      <div class="summary-list">
        ${insights.map(i=>`<div class="summary-item"><div class="summary-dot"></div><div>${escHtml(i)}</div></div>`).join('')}
      </div>
    </div>` : ''}

    ${commitments.length ? `
    <div class="summary-card">
      <div class="summary-section-title">Komitmen Anda</div>
      <div class="summary-list">
        ${commitments.map(c=>`<div class="summary-item"><div class="summary-dot green"></div><div>${escHtml(c)}</div></div>`).join('')}
      </div>
    </div>` : ''}

    <div style="text-align:center;padding:8px 0 24px">
      <div style="font-size:.78rem;color:var(--text3);margin-bottom:10px;font-weight:300">
        Terima kasih telah mengikuti sesi coaching, ${escHtml(talentData.nama)}.<br>
        Hasil sesi ini dapat dilihat oleh Regional Coach Anda.
      </div>
      <div style="font-size:.72rem;color:var(--text3)">Anda dapat menutup halaman ini.</div>
    </div>
  `;
  app.appendChild(summary);
}

// ── Claude API call — via GAS proxy (API key aman di server) ──
async function callClaude(msgs, systemPrompt, isOpening = false) {
  // Batasi history ke 10 pesan terakhir agar tidak terlalu besar
  const recentMsgs = isOpening ? [] : msgs.slice(-10).map(m => ({
    role: m.role === 'ai' ? 'assistant' : 'user',
    content: m.content
  }));
  const payload = {
    systemPrompt,
    isOpening,
    messages: recentMsgs
  };
  const r = await callGAS('proxyClaudeChat', JSON.stringify(payload));
  if (!r.success) throw new Error(r.error || 'Claude error');
  return r.text;
}

// ── GAS bridge ───────────────────────────────────────────────
function callGAS(fn, ...args) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + fn + '_' + Date.now();
    const url = new URL(GAS_URL);
    url.searchParams.set('fn', fn);
    url.searchParams.set('callback', cbName);
    args.forEach((a, i) => {
      const val = typeof a === 'string' ? a : JSON.stringify(a);
      url.searchParams.set('arg' + i, val);
    });

    const timeout = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      reject(new Error('Request timeout'));
    }, 30000);

    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      resolve(data);
    };

    const script = document.createElement('script');
    script.id = cbName;
    script.src = url.toString();
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
      reject(new Error('Script load error'));
    };
    document.head.appendChild(script);
  });
}

// ── Helpers ───────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatText(s) {
  return escHtml(s)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^(.+)$/,'<p>$1</p>');
}
function timeNow() {
  return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function showError(title, msg) {
  document.getElementById('app').innerHTML = `
    <div class="c-header"><div class="c-brand"><div class="c-logo">TR</div><div class="c-brand-name">Talent<span>Radar</span></div></div></div>
    <div class="state-screen">
      <div class="state-icon">⚠️</div>
      <div class="state-title">${escHtml(title)}</div>
      <div class="state-sub">${escHtml(msg)}</div>
    </div>`;
}
